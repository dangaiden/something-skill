Resources:

  SSHSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH inbound and all outbound
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedSSHCidr
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-ssh-sg"

  Instance01:
    Type: AWS::EC2::Instance
    Condition: CreateInstance01
    Properties:
      ImageId: !Sub "resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64"
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref SSHSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-node-01"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail
          exec > >(tee /var/log/user-data.log | logger -t user-data -s 2>/dev/console) 2>&1
          dnf install -y git nodejs npm
          node --version && npm --version && npx --version && git --version
          if [ "${SkillName}" != "" ]; then
            npx --yes skills add ${SkillName} --all
          fi
          echo "Bootstrap complete on $(hostname)"

