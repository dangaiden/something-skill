AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Deploy up to 20 EC2 instances (Amazon Linux 2023) each in a public subnet
  with auto-assigned public IPs. Node.js included. Instance count is parameterized.

Parameters:

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 key pair for SSH access.

  InstanceCount:
    Type: Number
    Default: 10
    MinValue: 1
    MaxValue: 20
    Description: Number of EC2 instances to create (1-20).

  AllowedSSHCidr:
    Type: String
    Default: "0.0.0.0/0"
    AllowedPattern: "^(\\d{1,3}\\.){3}\\d{1,3}/\\d{1,2}$"
    Description: CIDR block allowed to SSH into the instances.

  SkillName:
    Type: String
    Default: ""
    Description: >
      Optional. If set, runs `npx --yes skills add <SkillName> --all` on boot.

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type.

  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: "vpc-086173b9355df27bf"
    Description: VPC to deploy into (default VPC).

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Default: "subnet-0684c9dd0cf038e9a"
    Description: Public subnet with MapPublicIpOnLaunch enabled.

Conditions:
  CreateInstance01: !Or
